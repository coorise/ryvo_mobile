name: ryvo_admin
description: Ryvo-Line admin mobile app — mirrors client/web/ryvo_admin architecture.
publish_to: "none"
version: 1.0.2+9

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  shadcn_ui: ^0.54.0
  supabase_flutter: ^2.9.1
  go_router: ^15.1.2
  flutter_riverpod: ^2.6.1
  shared_preferences: ^2.5.3
  http: ^1.4.0
  intl: ^0.20.2
  equatable: ^2.0.7
  flutter_svg: ^2.2.0
  lucide_icons_flutter: ^3.0.0
  cached_network_image: ^3.4.1
  package_info_plus: ^8.3.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  google_maps_flutter: ^2.12.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon.png
  adaptive_icon_background: "#15803d"
  adaptive_icon_foreground: assets/icons/app_icon.png
  web:
    generate: true
    image_path: assets/icons/app_icon.png
    background_color: "#15803d"
    theme_color: "#15803d"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - lib/i18n/locales/
