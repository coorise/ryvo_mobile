name: Build client iOS prod

on:
  push:
    branches: [main_ios]
  workflow_dispatch:

permissions:
  contents: write

env:
  RYVO_DEPLOY_TARGET: prod
  RYVO_UPDATE_CHANNEL: remote
  RYVO_APP: client
  RYVO_RELEASE_PLATFORM: ios
  SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.PROD_SUPABASE_ANON_KEY }}
  FUNCTIONS_URL: ${{ secrets.PROD_SUPABASE_FUNCTIONS_URL }}
  GOOGLE_MAPS_API_KEY: ${{ secrets.PROD_GOOGLE_MAPS_API_KEY }}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build
        id: build
        run: chmod +x scripts/ci-build-release.sh && ./scripts/ci-build-release.sh client prod ios
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          name: Ryvo Client iOS (prod) ${{ steps.build.outputs.tag }}
          body: |
            **Version:** `${{ steps.build.outputs.raw }}`
            **Platform:** iOS (unsigned)
            **Release branch:** `main_ios`

            | Asset | Use |
            |-------|-----|
            | `${{ steps.build.outputs.artifact_name }}` | Device build (`.ipa`, unsigned) — sideload / OTA |
            | `${{ steps.build.outputs.ios_sim_bundle_name }}` | Simulator `.app` bundle (zip root) — cloud emulators, Xcode Simulator |

            Merge `main` → `main_ios` to publish client/driver iOS prod build.
          files: |
            .github_releases/mobile/ios/${{ steps.build.outputs.artifact_name }}
            .github_releases/mobile/ios/${{ steps.build.outputs.ios_sim_bundle_name }}
