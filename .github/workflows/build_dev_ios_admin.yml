name: Build admin iOS dev

on:
  push:
    branches: [dev_ios_admin]
  workflow_dispatch:

permissions:
  contents: write

env:
  RYVO_DEPLOY_TARGET: dev
  RYVO_UPDATE_CHANNEL: remote
  RYVO_APP: admin
  RYVO_RELEASE_PLATFORM: ios
  SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
  FUNCTIONS_URL: ${{ secrets.DEV_SUPABASE_FUNCTIONS_URL }}
  GOOGLE_MAPS_API_KEY: ${{ secrets.DEV_GOOGLE_MAPS_API_KEY }}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build
        id: build
        run: chmod +x scripts/ci-build-release.sh && ./scripts/ci-build-release.sh admin dev ios
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          name: Ryvo Admin iOS (dev) ${{ steps.build.outputs.tag }}
          body: |
            **Version:** `${{ steps.build.outputs.raw }}`
            **Platform:** iOS (unsigned)
            **Release branch:** `dev_ios_admin`

            | Asset | Use |
            |-------|-----|
            | `${{ steps.build.outputs.artifact_name }}` | Device build (`.ipa`, unsigned) — sideload / OTA |
            | `${{ steps.build.outputs.ios_sim_bundle_name }}` | Simulator `.app` bundle (zip root) — cloud emulators, Xcode Simulator |

            Merge `dev` → `dev_ios_admin` to publish admin iOS dev build.
          files: |
            .github_releases/mobile/ios/${{ steps.build.outputs.artifact_name }}
            .github_releases/mobile/ios/${{ steps.build.outputs.ios_sim_bundle_name }}
          prerelease: true
