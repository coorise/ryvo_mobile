name: Dev integration

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [ryvo, ryvo_admin]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        working-directory: flutter/${{ matrix.app }}
        run: flutter pub get

      - name: Analyze
        working-directory: flutter/${{ matrix.app }}
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Unit tests
        working-directory: flutter/${{ matrix.app }}
        run: flutter test
