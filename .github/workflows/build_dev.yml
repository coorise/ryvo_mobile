name: Build dev mobile apps

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

env:
  RYVO_DEPLOY_TARGET: dev
  RYVO_UPDATE_CHANNEL: remote
  SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
  FUNCTIONS_URL: ${{ secrets.DEV_SUPABASE_FUNCTIONS_URL }}
  GOOGLE_MAPS_API_KEY: ${{ secrets.DEV_GOOGLE_MAPS_API_KEY }}

jobs:
  build-admin-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses

      - name: Apply package id (dev)
        run: chmod +x scripts/*.sh flutter/ryvo_admin/*.sh && ./scripts/set-package-id.sh admin dev

      - name: Setup Android signing (admin dev)
        env:
          KEYSTORE_B64: ${{ secrets.ADMIN_DEV_ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ADMIN_DEV_ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ADMIN_DEV_ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ADMIN_DEV_ANDROID_KEY_ALIAS }}
          REQUIRE_ANDROID_SIGNING: "1"
        run: ./scripts/setup-android-signing.sh dev admin

      - name: Build admin release APK
        working-directory: flutter/ryvo_admin
        run: |
          chmod +x run_build.sh scripts/*.sh
          ./run_build.sh release --dev

      - name: Stage release artifact
        run: |
          mkdir -p .github_releases/mobile/android
          cp flutter/ryvo_admin/build/app/outputs/flutter-apk/app-release.apk \
            .github_releases/mobile/android/ryvo_admin-dev.apk

      - name: Read version
        id: version
        working-directory: flutter/ryvo_admin
        run: |
          RAW=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          V=$(echo "$RAW" | tr '+' '-')
          echo "raw=$RAW" >> "$GITHUB_OUTPUT"
          echo "tag=ryvo_admin-dev-v${V}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Ryvo Admin (dev) ${{ steps.version.outputs.tag }}
          body: |
            **Version:** `${{ steps.version.outputs.raw }}`
            **Tag:** `${{ steps.version.outputs.tag }}`

            First dev release with stable Android signing and OTA support.

            **v1.0.2:** About dialog with manual update check; login placeholders no longer prefilled.

            Automated dev build from branch `dev`.
          files: .github_releases/mobile/android/ryvo_admin-dev.apk
          prerelease: true

  build-client-android:
    runs-on: ubuntu-latest
    if: false # Enable when flutter/ryvo client app is ready for CI.
    steps:
      - uses: actions/checkout@v4
      - run: echo "client app CI placeholder"
