name: Build client iOS dev

on:
  push:
    branches: [dev_ios]
  workflow_dispatch:

permissions:
  contents: write

env:
  RYVO_DEPLOY_TARGET: dev
  RYVO_UPDATE_CHANNEL: remote
  RYVO_APP: client
  RYVO_RELEASE_PLATFORM: ios
  SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
  SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
  FUNCTIONS_URL: ${{ secrets.DEV_SUPABASE_FUNCTIONS_URL }}
  GOOGLE_MAPS_API_KEY: ${{ secrets.DEV_GOOGLE_MAPS_API_KEY }}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Build
        id: build
        run: chmod +x scripts/ci-build-release.sh && ./scripts/ci-build-release.sh client dev ios
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build.outputs.tag }}
          name: Ryvo Client iOS (dev) ${{ steps.build.outputs.tag }}
          body: |
            **Version:** `${{ steps.build.outputs.raw }}`
            **Platform:** iOS (unsigned IPA — install manually)
            **Release branch:** `dev_ios`

            Merge `dev` → `dev_ios` to publish client/driver iOS dev build.
          files: .github_releases/mobile/ios/${{ steps.build.outputs.artifact_name }}
          prerelease: true
